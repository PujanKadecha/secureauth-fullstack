<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #f9fafb; 
      padding: 20px; 
      margin: 0;
    }
    .container { 
      max-width: 600px; 
      margin: 0 auto; 
      background: white; 
      border-radius: 12px; 
      padding: 40px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
    }
    .button { 
      background: #000000; 
      color: white; 
      padding: 14px 28px; 
      text-decoration: none; 
      border-radius: 8px; 
      font-weight: bold; 
      display: inline-block; 
      margin: 20px 0; 
    }
    .footer { 
      margin-top: 30px; 
      font-size: 12px; 
      color: #6b7280; 
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Password Reset Request</h2>
    <p>Hello <%= name %>,</p>
    <p>You have requested to reset your password. Please click the button below to proceed:</p>
    <a href="<%= resetLink %>" class="button">Reset My Password</a>
    <p>This link will expire in 15 minutes.</p>
    <div class="footer">
      If you didn't request this, you can safely ignore this email.
    </div>
  </div>
</body>
</html>
